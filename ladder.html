<!DOCTYPE html>
<html>
<head>
<title>Ladder</title>
<style>
body {text-align:center;background:#0f172a;color:white;}
.ladder {position:relative;width:200px;height:400px;margin:auto;border-left:5px solid white;border-right:5px solid white;}
.step {position:absolute;width:100%;height:2px;background:white;}
.player {position:absolute;left:50%;transform:translateX(-50%);}
.student {background:#1e293b;margin:5px;padding:5px;cursor:pointer;}
</style>
</head>

<body>

<h1>🪜 Ladder Activity</h1>

<div id="list"></div>
<div class="ladder" id="ladder"></div>

<button onclick="goHome()">HOME</button>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let progress = JSON.parse(localStorage.getItem("progress")) || {};

students.forEach(s=>{ if(!progress[s]) progress[s]=0; });

let ladder=document.getElementById("ladder");
let list=document.getElementById("list");

// steps
for(let i=0;i<10;i++){
    let step=document.createElement("div");
    step.className="step";
    step.style.bottom=(i*40)+"px";
    ladder.appendChild(step);
}

students.forEach(s=>{

    let row=document.createElement("div");
    row.className="student";
    row.innerText=s+" ("+progress[s]+")";
    row.onclick=()=>move(s,row);
    list.appendChild(row);

    let p=document.createElement("div");
    p.className="player";
    p.id="p-"+s;
    p.innerText="🧑 "+s;
    p.style.bottom=(progress[s]*40)+"px";
    ladder.appendChild(p);
});

function move(s,row){
    if(progress[s]<9) progress[s]++;
    document.getElementById("p-"+s).style.bottom=(progress[s]*40)+"px";
    row.innerText=s+" ("+progress[s]+")";

    localStorage.setItem("progress", JSON.stringify(progress));
}

function goHome(){
    window.location.href="index.html";
}

</script>

</body>
</html>
