<!DOCTYPE html>
<html>
<head>
<title>Ladder Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🪜 Ladder Leaderboard</header>

<div class="container">
<div id="board"></div>
<button onclick="randomBoost()">🎲 Random Boost</button>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let scores = {};

students.forEach(s=>scores[s]=0);

function render(){
    let sorted = Object.entries(scores)
        .sort((a,b)=>b[1]-a[1]);

    let html = "";
    sorted.forEach(([name,score],i)=>{
        html += `<div class="card">${i+1}. ${name} - ${score}</div>`;
    });

    document.getElementById("board").innerHTML = html;
}

function randomBoost(){
    let s = students[Math.floor(Math.random()*students.length)];
    scores[s] += 1;
    render();
}

render();
</script>

</body>
</html>
