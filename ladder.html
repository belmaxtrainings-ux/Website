<!DOCTYPE html>
<html>
<head>
<title>Ladder</title>

<style>
body {background:#0f172a;color:white;text-align:center;}
.student {background:#1e293b;margin:5px;padding:8px;cursor:pointer;}
.ladder {height:300px;border-left:5px solid white;border-right:5px solid white;position:relative;width:200px;margin:auto;}
.player {position:absolute;left:50%;transform:translateX(-50%);}
</style>
</head>

<body>

<h2>🪜 Ladder Game</h2>

<div id="list"></div>
<div class="ladder" id="ladder"></div>

<button onclick="home()">Home</button>

<script>

let students=JSON.parse(localStorage.getItem("students"))||[];
let progress={};

students.forEach(s=>progress[s]=0);

students.forEach(s=>{
    let row=document.createElement("div");
    row.className="student";
    row.innerText=s;
    row.onclick=()=>move(s);
    document.getElementById("list").appendChild(row);

    let p=document.createElement("div");
    p.className="player";
    p.id=s;
    p.innerText="🚀 "+s;
    document.getElementById("ladder").appendChild(p);
});

function move(s){
    progress[s]++;
    document.getElementById(s).style.bottom=(progress[s]*30)+"px";
}

function home(){ window.location.href="index.html"; }

</script>

</body>
</html>
