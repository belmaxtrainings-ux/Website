<!DOCTYPE html>
<html>
<head>
<title>Wheel of Names</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🎡 Wheel of Names</header>

<div class="container">
<canvas id="wheel" width="400" height="400"></canvas>
<button onclick="spin()">SPIN</button>
<h2 id="winner"></h2>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");
let angle = 0;

function getFontSize(count){
    if(count <= 5) return 18;
    if(count <= 10) return 14;
    if(count <= 20) return 11;
    return 9;
}

function draw(){
    let arc = 2 * Math.PI / students.length;

    students.forEach((s,i)=>{
        ctx.beginPath();
        ctx.moveTo(200,200);
        ctx.arc(200,200,200,i*arc+angle,(i+1)*arc+angle);
        ctx.fillStyle = `hsl(${i*40},70%,60%)`;
        ctx.fill();

        ctx.save();
        ctx.translate(200,200);
        ctx.rotate(i*arc + arc/2 + angle);

        ctx.fillStyle="white";
        ctx.font = getFontSize(students.length) + "px Arial";
        ctx.textAlign="right";

        let name = s.length > 10 ? s.substring(0,10)+"…" : s;
        ctx.fillText(name,180,5);

        ctx.restore();
    });
}

draw();

function spin(){
    let spins = 30;
    let interval = setInterval(()=>{
        angle += 0.3;
        ctx.clearRect(0,0,400,400);
        draw();
        spins--;

        if(spins<=0){
            clearInterval(interval);
            let winner = students[Math.floor(Math.random()*students.length)];
            document.getElementById("winner").innerText = "🎉 " + winner;
        }
    },40);
}
</script>

</body>
</html>
