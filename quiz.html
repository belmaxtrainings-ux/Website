<!DOCTYPE html>
<html>
<head>
<title>Quiz Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>❓ Quiz Generator</header>

<div class="container">

<h3 id="question"></h3>
<div id="options"></div>
<button onclick="next()">Next Question</button>

</div>

<script>
let questions = [
{q:"CPU stands for?", options:["Central Processing Unit","Control","Unit","None"], answer:0},
{q:"Binary of 2?", options:["10","11","01","00"], answer:0},
{q:"Input device?", options:["Keyboard","Monitor","Speaker","Printer"], answer:0}
];

function loadQuestion(){
    let q = questions[Math.floor(Math.random()*questions.length)];
    document.getElementById("question").innerText = q.q;

    let optDiv = document.getElementById("options");
    optDiv.innerHTML = "";

    q.options.forEach((opt,i)=>{
        let btn = document.createElement("div");
        btn.className="option";
        btn.innerText=opt;

        btn.onclick=()=>{
            alert(i===q.answer ? "✅ Correct" : "❌ Wrong");
        };

        optDiv.appendChild(btn);
    });
}

function next(){
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
