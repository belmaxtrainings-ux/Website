<!DOCTYPE html>
<html>
<head>
<title>Tech Teacher Toolkit</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

header {
    text-align:center;
    padding:20px;
    font-size:24px;
    color:#38bdf8;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

textarea {
    width:100%;
    height:100px;
    border-radius:10px;
    padding:10px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:20px;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    text-align:center;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.05);
    background:#38bdf8;
    color:black;
}

button {
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🎮 Tech Teacher Toolkit</header>

<div class="container">

<h3>👩‍🏫 Enter Student Names</h3>
<textarea id="names" placeholder="One name per line"></textarea>
<button onclick="saveNames()">Save Names</button>

<div class="grid">

<div class="card" onclick="go('wheel.html')">
🎡 Wheel + Quiz
</div>

<div class="card" onclick="go('ladder.html')">
🪜 Ladder Game
</div>

<div class="card" onclick="go('quiz.html')">
❓ Quick Quiz
</div>

</div>

</div>

<script>

function saveNames(){
    let names=document.getElementById("names").value.split("\n").filter(n=>n);
    localStorage.setItem("students", JSON.stringify(names));
    alert("Saved!");
}

function go(page){
    window.location.href=page;
}

</script>

</body>
</html>
